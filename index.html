<!DOCTYPE html>
<html lang="uk">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Awarder — Manager Page Prototype</title>
  <style>
    :root {
      --bg: #eef4ff;
      --panel: #ffffff;
      --panel-2: #f8fbff;
      --text: #1e293b;
      --muted: #64748b;
      --line: #dbe5f1;
      --blue: #4f8df7;
      --blue-soft: #eaf2ff;
      --green: #22c55e;
      --green-soft: #e9f9ef;
      --orange: #f59e0b;
      --orange-soft: #fff5e6;
      --red: #ef4444;
      --red-soft: #ffecec;
      --gray: #94a3b8;
      --gray-soft: #f1f5f9;
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:  'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.4;
    }

    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 10px 14px 18px;
    }
    
    .product-config{
     color:#64748b;
     font-weight:400;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr 140px;
      gap: 10px;
      margin-bottom: 10px;
    }

    .search-wrap {
      background: var(--panel);
      border: 1.5px solid #cbd5e1;
      border-radius: 999px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      min-height: 56px;
      box-shadow: var(--shadow);
      gap: 10px;
    }

    .search-icon {
     font-size: 18px;
     opacity: 0.6;
    }
    
    .search-wrap:hover {
      border-color: #94a3b8;
    }
    
    .search-wrap:focus-within {
     border-color: #3b82f6;
     box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .search-wrap input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 22px;
      font-weight: 600;
      color: #0f172a;
      background: transparent;
      font-family: "Inter", system-ui, sans-serif;
    }

    .search-wrap input::placeholder {
      color: #94a3b8;
      font-weight: 500;
    }

    .search-btn {
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #6aa8ff, #4f8df7);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--shadow);
      min-height: 52px;
      padding: 0 18px;
    }

    .layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  align-items: start;
}

    .panel {
      background: var(--panel);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .left-panel {
      padding: 12px 14px 14px;
    }

    .summary-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 10px;
    }

    .summary-title {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .qty-pill {
      background: var(--gray-soft);
      border: 2px solid #cfe0ff;
      color: #48607f;
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 20px;
      font-weight: 800;
      min-width: 64px;
      text-align: center;
    }

    .order-number {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.1;
}

    .status-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
  border: 1px solid transparent;
}

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: currentColor;
      flex: 0 0 auto;
    }

.chip-blue {
  background: #eaf2ff;
  color: #4f8df7;
  border-color: #d6e6ff;
}

.chip-green {
  background: #eaf9ef;
  color: #22c55e;
  border-color: #d9f3e2;
}

.chip-orange {
  background: #fff4e5;
  color: #f59e0b;
  border-color: #ffe2b8;
}

.chip-red {
  background: #ffecec;
  color: #ef4444;
  border-color: #ffd4d4;
}

.chip-gray {
  background: #f1f5f9;
  color: #94a3b8;
  border-color: #e2e8f0;
}

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
      padding: 4px 0 0;
      font-size: 13px;
    }

    .meta-card {
      background: #fbfdff;
      border: 1px solid #d9e4f2;
      border-radius: 12px;
      padding: 10px 14px;
    }

    .meta-label {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .meta-value {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
    }
    
    .meta-tooltip-wrap{
  position: relative;
  display: inline-flex;
  align-items: center;
}

.meta-icon-text{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: default;
}

.meta-tooltip{
  position: absolute;
  left: 0;
  top: calc(100% + 8px);
  min-width: 220px;
  max-width: 280px;
  background: #dcebfa;
  color: #475569;
  font-size: 12px;
  font-weight: 500;
  line-height: 1.35;
  padding: 10px 12px;
  border-radius: 12px;
  box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
  opacity: 0;
  visibility: hidden;
  transform: translateY(-4px);
  transition: 0.18s ease;
  z-index: 20;
}

.meta-tooltip-wrap:hover .meta-tooltip{
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

    .items {
      display: grid;
      gap: 8px;
    }

    .item-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      background: #fff;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .item-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
      border-color: #c7d7f5;
    }

    .item-card.active {
      border-color: #7aa6ff;
      box-shadow: 0 10px 24px rgba(79, 141, 247, 0.12);
    }

    .item-top {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

   .item-image {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  overflow: hidden;
  background: #f1f5f9;
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #94a3b8;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  padding: 4px;
}
    .item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .item-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.25;
    }

    .item-subtitle {
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .item-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: #475569;
      font-size: 13px;
      font-weight: 600;
    }

    .item-right {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      min-width: 150px;
    }
    
    .mini-icon{
    font-size: 13px;
    opacity: 0.9;
    }

    .progress-box {
      width: 170px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 800;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      background: #e8eef8;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, #7db1ff, #4f8df7);
    }

    .flow-row {
  margin-top: 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 18px;
  background: #fbfdff;
  border: 1px solid var(--line);
  padding: 8px 12px;
  border-radius: 12px;
}

    .flow-label{
  font-size:12px;
  color:#64748b;
  font-weight:700;
  line-height:1.2;
}
    
    .flow-inline{
  display:flex;
  align-items:baseline;
  gap:6px;
  min-width:0;
}

    .flow-value{
  font-size:13px;
  font-weight:600;
  line-height:1.2;
}

    .right-panel {
  padding: 18px;
  position: sticky;
  top: 18px;
  display: none;
}
    .layout.open-detail {
  grid-template-columns: 1.3fr 0.9fr;
}

.layout.open-detail .right-panel {
  display: block;
}

    .detail-empty {
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(180deg, #fbfdff, #f4f8ff);
      border-radius: 18px;
      border: 1px dashed #c8d7ee;
    }

    .detail-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .detail-title {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .detail-submeta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }

    .close-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 12px;
      background: #f1f5f9;
      font-size: 22px;
      font-weight: 900;
      color: #334155;
      cursor: pointer;
    }

    .detail-current {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fbfdff;
    }
    
    .detail-current .flow-inline:first-child .flow-value{
      color:#2563eb;
      font-weight:700;
    }

    .detail-progress {
      margin-bottom: 14px;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .workflow-list {
      display: grid;
      gap: 10px;
    }

    .step-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
    }

    .step-left {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .step-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-top: 7px;
      flex: 0 0 auto;
    }

    .step-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .step-note {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .step-right {
      text-align: right;
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .step-time {
      color: #475569;
      font-size: 14px;
      font-weight: 800;
    }

    .indicator-done { background: var(--green); }
    .indicator-current { background: var(--blue); }
    .indicator-paused { background: var(--orange); }
    .indicator-blocked { background: var(--red); }
    .indicator-cancelled { background: var(--gray); }
    .indicator-next { background: #cbd5e1; }
    .indicator-rework { background: #fb923c; }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .right-panel {
        position: static;
      }

      .meta-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .search-btn {
        min-height: 58px;
        font-size: 24px;
      }

      .search-wrap input {
        font-size: 20px;
      }

      .order-number {
        font-size: 28px;
      }

      .meta-grid,
      .detail-current,
      .flow-row,
      .item-top {
        grid-template-columns: 1fr;
      }

      .item-right {
        align-items: flex-start;
      }

      .progress-box {
        width: 100%;
      }

      .step-card {
        grid-template-columns: 1fr;
      }

      .step-right {
        justify-items: start;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <label class="search-wrap">
        <span class="search-icon">🔎</span>
        <input id="searchInput" type="text" placeholder="Напр.: 4349" value="4349" />
       </label>
      <button class="search-btn" id="searchBtn">Знайти</button>
    </div>

    <div class="layout">
      <section class="panel left-panel">
        <div class="summary-head">
          <div class="summary-title">
            <div class="qty-pill" id="summaryQty">3/3</div>
            <div class="order-number" id="summaryOrder">O-AW-4349</div>
            <span class="status-chip chip-blue"><span class="dot"></span>У роботі</span>
          </div>
        </div>

        <div class="meta-grid">
          <div class="meta-card">
            <div class="meta-label">Дедлайн</div>
            <div class="meta-value" id="summaryDeadline">19.03.2026</div>
          </div>
          <div class="meta-card">
            <div class="meta-label">Створено</div>
            <div class="meta-value" id="summaryCreated">11.03.2026</div>
          </div>
          <div class="meta-card">
            <div class="meta-label">Клієнт</div>
            <div class="meta-value" id="summaryClient">Марина Awarder</div>
          </div>
        </div>

        <div class="items" id="itemsList"></div>
      </section>

      <aside class="panel right-panel" id="detailPanel">
        <div class="detail-empty">Вибери продукт зі списку, щоб побачити деталі workflow.</div>
      </aside>
    </div>
  </div>

  <script>

    const statusToChip = {
      'У роботі': 'chip-blue',
      'Виконано': 'chip-green',
      'На паузі': 'chip-orange',
      'Заблоковано': 'chip-red',
      'Скасовано': 'chip-gray',
      'Переробити': 'chip-orange',
      'Наступна': 'chip-gray'
    };

    const stepIndicatorClass = {
      'Виконано': 'indicator-done',
      'У роботі': 'indicator-current',
      'На паузі': 'indicator-paused',
      'Заблоковано': 'indicator-blocked',
      'Скасовано': 'indicator-cancelled',
      'Наступна': 'indicator-next',
      'Переробити': 'indicator-rework'
    };

    const listEl = document.getElementById('itemsList');
    const detailEl = document.getElementById('detailPanel');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');

    let currentOrder = orders[0];
    let activeItemId = null;

    function renderSummary(order) {
      document.getElementById('summaryQty').textContent = `${order.qtyDone}/${order.qtyTotal}`;
      document.getElementById('summaryOrder').textContent = order.orderNumber;
      document.getElementById('summaryDeadline').textContent = order.deadline;
      document.getElementById('summaryCreated').textContent = order.createdAt;
      document.getElementById('summaryClient').textContent = order.client;
    }

    function renderItems(order) {
      listEl.innerHTML = order.items.map(item => {
        const isActive = item.id === activeItemId;
        return `
          <article class="item-card ${isActive ? 'active' : ''}" data-item-id="${item.id}">
            <div class="item-top">
              <div class="item-image">Фото</div>
              <div>
               <div class="item-title">
  ${item.name}<span class="product-config"> (${item.config})</span>
</div>
               <div class="item-meta">
                    <div class="meta-tooltip-wrap">
                   <span class="meta-icon-text">
                  <span class="mini-icon">📅</span>
                  ${item.productDeadline}
                  </span>
                    <div class="meta-tooltip">Найближчий дедлайн виробництва в межах цього замовлення</div>
                   </div>

                   <div class="meta-tooltip-wrap">
                   <span class="meta-icon-text">
                   <span class="mini-icon">🧾</span>
                   ${item.externalOrderNumber}
                  </span>
                  <div class="meta-tooltip">Номер зовнішнього замовлення</div>
                  </div>

  <span>Остання зміна: ${item.lastStatusChange}</span>
</div>
              </div>
              <div class="item-right">
                <span class="status-chip ${statusToChip[item.status] || 'chip-gray'}"><span class="dot"></span>${item.status}</span>
              </div>
            </div>
           <div class="flow-row">
            <div class="flow-inline">
            <span class="flow-label">Current:</span>
            <span class="flow-value current-task">${item.currentTask}</span>
          </div>
            <div class="flow-inline">
            <span class="flow-label">Next:</span>
            <span class="flow-value">${item.nextTask}</span>
         </div>
        </div>
          </article>
        `;
      }).join('');

      listEl.querySelectorAll('.item-card').forEach(card => {
       card.addEventListener('click', () => {
  const id = card.dataset.itemId;
  activeItemId = id;
  renderItems(currentOrder);
  const item = currentOrder.items.find(x => x.id === id);
  renderDetail(item);
  document.querySelector('.layout').classList.add('open-detail');
});
      });
    }

    function renderDetail(item) {
      if (!item) {
        detailEl.innerHTML = `<div class="detail-empty">Вибери продукт зі списку, щоб побачити деталі workflow.</div>`;
        return;
      }

      const legendStatuses = ['Виконано', 'У роботі', 'На паузі', 'Заблоковано', 'Скасовано', 'Переробити'];

      detailEl.innerHTML = `
        <div class="detail-head">
          <div>
            <div class="detail-title">${item.name}</div>
            <div class="detail-submeta">
              <span><strong>Остання зміна:</strong> ${item.lastStatusChange}</span>
              <span><strong>SKU:</strong> ${item.sku}</span>
              <span><strong>Workflow:</strong> ${currentOrder.workflow}</span>
            </div>
          </div>
          <button class="close-btn" id="closeDetail">×</button>
        </div>

       <div class="detail-current">
        <div class="flow-inline">
        <span class="flow-label">Current:</span>
        <span class="flow-value">${item.currentTask}</span>
    </div>

     <div class="flow-inline">
        <span class="flow-label">Next:</span>
        <span class="flow-value">${item.nextTask}</span>
    </div>
    </div>

        <div class="detail-progress">
          <div class="progress-top">
            <span>Progress</span>
            <strong>${item.progress}%</strong>
          </div>
          <div class="progress-track">
            <div class="progress-bar" style="width:${item.progress}%"></div>
          </div>
        </div>

        <div class="legend">
          ${legendStatuses.map(status => `
            <span class="status-chip ${statusToChip[status] || 'chip-gray'}"><span class="dot"></span>${status}</span>
          `).join('')}
        </div>

        <div class="workflow-list">
          ${item.steps.map(step => `
            <div class="step-card">
              <div class="step-left">
                <span class="step-indicator ${stepIndicatorClass[step.status] || 'indicator-next'}"></span>
                <div>
                  <div class="step-title">${step.name}</div>
                  <div class="step-note">${step.note || '—'}</div>
                </div>
              </div>
              <div class="step-right">
                <span class="status-chip ${statusToChip[step.status] || 'chip-gray'}"><span class="dot"></span>${step.status}</span>
                <div class="step-time">${step.time || '—'}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      document.getElementById('closeDetail').addEventListener('click', () => {
        activeItemId = null;
        renderItems(currentOrder);
        renderDetail(null);
        document.querySelector('.layout').classList.remove('open-detail');
      });
    }

    function searchOrder() {
      const value = searchInput.value.trim();
      const found = orders.find(order => order.searchKey.includes(value) || order.orderNumber.includes(value));
      if (!found) {
        activeItemId = null;
        listEl.innerHTML = '';
        detailEl.innerHTML = `<div class="detail-empty">По запиту <strong>${value}</strong> нічого не знайдено.</div>`;
        return;
      }
      currentOrder = found;
      activeItemId = currentOrder.items[0]?.id || null;
      renderSummary(currentOrder);
      renderItems(currentOrder);
      renderDetail(currentOrder.items[0] || null);
    }

    searchBtn.addEventListener('click', searchOrder);
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchOrder();
    });

    renderSummary(currentOrder);
    activeItemId = currentOrder.items[0].id;
    renderItems(currentOrder);
    renderDetail(currentOrder.items[0]);
  </script>
</body>
</html>
